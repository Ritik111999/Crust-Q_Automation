# =============================================================================
# Crust & Q Unified Automation — Global Configuration & Test Data
# Naming convention: crustq.<role>.<page>.<field>[.<index>]
# Credentials support ${ENV_VAR} placeholders for CI/CD secrets.
# =============================================================================

# --- Platform routing (pwa | android | ios) ---
# Override at runtime: mvn test -Dplatform.active=android
platform.active=pwa

# --- Role base URLs (PWA / Web) ---
# User & Driver share the Crust & Q PWA (customer/delivery app)
user.base.url=https://pwa.crustq.betaplanets.com
driver.base.url=https://pwa.crustq.betaplanets.com
# Admin uses the backend admin panel
admin.base.url=https://crustq.betaplanets.com

# --- Browser & timeouts ---
browser=chrome
implicit.wait.seconds=0
explicit.wait.seconds=20
page.load.timeout.seconds=60
navigation.retry.count=2

# --- Chrome (exclusive browser) ---
chrome.headless=true

# --- Appium server (mobile — used from Step 2 onward) ---
appium.server.host=127.0.0.1
appium.server.port=4723
appium.server.base.path=/
appium.server.auto.start=false
appium.server.auto.stop=true
appium.server.startup.timeout.seconds=60

# --- Mobile capabilities files (classpath under src/test/resources/) ---
mobile.android.capabilities.file=capabilities/android-local.json
mobile.ios.capabilities.file=capabilities/ios-local.json

# --- Android app identifiers (fill when mobile tests are added) ---
mobile.android.app.package=
mobile.android.app.activity=

# --- iOS app identifiers (fill when mobile tests are added) ---
mobile.ios.bundle.id=
mobile.ios.udid=

# --- Mobile login accessibility labels (override when app UI differs) ---
mobile.android.login.email.accessibility=Enter email address
mobile.android.login.password.accessibility=Enter password
mobile.android.login.signin.accessibility=Sign In
mobile.ios.login.email.accessibility=Enter email address
mobile.ios.login.password.accessibility=Enter password
mobile.ios.login.signin.accessibility=Sign In

# --- Mobile session timeouts ---
mobile.command.timeout.seconds=120

# --- Cross-functional E2E (PWA + Mobile in same @Test) ---
cross.functional.mobile.platform=android

# --- Reporting ---
report.product.name=Crust & Q Unified Automation
report.name=Crust & Q PWA — Extended Module Wise QA Report
report.title=Crust & Q PWA — Test Execution Report
screenshot.on.pass=true
screenshot.on.fail=true

# --- Reporting: execution environment metadata ---
report.env.automation.engine=Selenium WebDriver
report.env.platform.name=Web (PWA)
report.env.device.name=Google Chrome
report.env.os.version=Desktop
report.env.app.version=Latest
report.env.app.package=Crust & Q PWA

# --- User (Customer) role ---
crustq.user.login.path=/auth
crustq.user.login.valid.email=carlu@knoxweb.us
crustq.user.login.valid.password=sR@123456
crustq.user.login.expected.success.path=/dashboard
crustq.user.dashboard.path=/dashboard
crustq.user.profile.path=/profile
crustq.user.edit.profile.path=/edit-profile
crustq.user.payment.method.path=/payment-method
crustq.user.order.history.path=/order-detail
crustq.user.address.path=/address
crustq.user.browse.menu.path=/browse-menu
crustq.user.menu.detail.path=/menu-detail
crustq.user.cart.path=/cart
crustq.user.checkout.path=/checkout
crustq.user.delivery.time.path=/delivery-time-view
crustq.user.order.status.path=/order

# --- Real-world test data catalog (see real-world-test-data.properties) ---
# Personas, addresses, cards, and loyalty tiers live in the catalog.
# Use RealWorldTestData.java in tests — do not hardcode form inputs.
testdata.default.profile.user.id=1
testdata.default.address.id=1
testdata.default.payment.card.id=1
crustq.add.card.url.fragment=add-card-details
crustq.user.address.save.toggle=true

# --- Admin (Dispatcher) role ---
crustq.admin.login.path=/login
crustq.admin.login.valid.email=admin@knoxweb.us
crustq.admin.login.valid.password=sR123456
crustq.admin.login.expected.success.path=/dashboard
crustq.admin.drivers.path=/drivers
crustq.admin.driver.permission.success.message=success

# --- Driver (Delivery Agent) role ---
