name: Crust and Q Automation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: crustq-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Selenium TestNG (Chrome headless)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Run automation suite (CI profile)
        env:
          CRUSTQ_USER_BASE_URL: ${{ secrets.CRUSTQ_USER_BASE_URL }}
          CRUSTQ_ADMIN_BASE_URL: ${{ secrets.CRUSTQ_ADMIN_BASE_URL }}
          CRUSTQ_DRIVER_BASE_URL: ${{ secrets.CRUSTQ_DRIVER_BASE_URL }}
          CRUSTQ_USER_EMAIL: ${{ secrets.CRUSTQ_USER_EMAIL }}
          CRUSTQ_USER_PASSWORD: ${{ secrets.CRUSTQ_USER_PASSWORD }}
          CRUSTQ_ADMIN_EMAIL: ${{ secrets.CRUSTQ_ADMIN_EMAIL }}
          CRUSTQ_ADMIN_PASSWORD: ${{ secrets.CRUSTQ_ADMIN_PASSWORD }}
          CRUSTQ_DRIVER_EMAIL: ${{ secrets.CRUSTQ_DRIVER_EMAIL }}
          CRUSTQ_DRIVER_PASSWORD: ${{ secrets.CRUSTQ_DRIVER_PASSWORD }}
        run: |
          MVN_ARGS="-B test -Pci -Dchrome.headless=true"
          if [ -n "$CRUSTQ_USER_BASE_URL" ]; then
            MVN_ARGS="$MVN_ARGS -Duser.base.url=$CRUSTQ_USER_BASE_URL"
          fi
          if [ -n "$CRUSTQ_ADMIN_BASE_URL" ]; then
            MVN_ARGS="$MVN_ARGS -Dadmin.base.url=$CRUSTQ_ADMIN_BASE_URL"
          fi
          if [ -n "$CRUSTQ_DRIVER_BASE_URL" ]; then
            MVN_ARGS="$MVN_ARGS -Ddriver.base.url=$CRUSTQ_DRIVER_BASE_URL"
          fi
          mvn $MVN_ARGS

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crustq-reports-${{ github.run_number }}
          path: |
            test-output/reports/
            test-output/screenshots/
          retention-days: 14

      - name: Upload Surefire results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7
